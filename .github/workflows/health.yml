name: Health check

# End-to-end read-only check against the real Yandex Metrica account.
#
# Yandex OAuth tokens are long-lived (~1 year), so the token is stored directly
# as a repo secret — no per-run minting needed (unlike VK Ads). smoke makes NO
# writes (lists counters). Runs daily and on push to main; never on
# pull_request, so the secret is not exposed to PRs/forks.
on:
  schedule:
    - cron: "0 8 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    if: github.repository == 'askads/mcp-yandex-metrica'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Read-only smoke check
        run: npm run smoke
        env:
          YANDEX_METRIKA_TOKEN: ${{ secrets.YANDEX_METRIKA_TOKEN }}
